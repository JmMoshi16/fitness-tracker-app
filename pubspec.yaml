name: fitness_tracker
description: Fitness Activity Tracker App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  shared_preferences: ^2.2.2
  http: ^1.2.0
  intl: ^0.19.0
  provider: ^6.1.2
  image_picker: ^1.1.2
  firebase_storage: ^12.3.2
  audioplayers: ^6.6.0
  flutter_local_notifications: ^21.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
