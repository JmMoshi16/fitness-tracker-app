name: fitness_tracker
description: Fitness Activity Tracker App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  shared_preferences: ^2.2.2
  http: ^1.2.0
  intl: ^0.19.0
  provider: ^6.1.2
  image_picker: ^1.1.2
  firebase_storage: ^12.3.2
  path_provider: ^2.1.4
  csv: ^6.0.0
  geolocator: ^13.0.2
  fl_chart: ^0.69.0
  flutter_local_notifications: ^18.0.1
  pedometer: ^4.0.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
